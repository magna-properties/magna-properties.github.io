<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Magna Properties — Algarve Real Estate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06050a;
    --bg-soft: #0c0a12;
    --gold: #b8935a;
    --gold-bright: #d4a96a;
    --ink: #f2ede4;
    --muted: #8a8479;
    --line: rgba(242, 237, 228, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-weight: 300;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ===== NAV ===== */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 28px 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(6,5,10,0.85), rgba(6,5,10,0));
    backdrop-filter: blur(2px);
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--ink);
  }
  .logo .dot { color: var(--gold); margin: 0 6px; }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 40px;
  }
  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }
  .nav-links a {
    color: var(--ink);
    text-decoration: none;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.3s ease;
  }
  .nav-links a:hover { color: var(--gold); }

  .lang-toggle {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px;
    display: inline-flex;
    gap: 0;
    background: rgba(12, 10, 18, 0.5);
  }
  .lang-toggle button {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.15em;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .lang-toggle button.active {
    background: var(--gold);
    color: var(--bg);
  }

  /* ===== HERO ===== */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 120px 24px 80px;
  }
  #particle-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 0;
  }
  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 1100px;
  }
  .hero-kicker {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
  }
  .hero-kicker:empty { display: none; }
  .hero-sub {
    max-width: 640px;
    margin: -8px auto 48px;
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    font-weight: 300;
    line-height: 1.6;
    color: rgba(242, 237, 228, 0.78);
    text-align: center;
    text-wrap: balance;
  }
  .hero-sub:empty { display: none; }
  h1.hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(40px, 5.6vw, 84px);
    line-height: 1.05;
    letter-spacing: -0.015em;
    color: var(--ink);
    margin-bottom: 56px;
    max-width: 1100px;
    text-wrap: balance;
  }
  h1.hero-title em {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #b8935a;
    font-weight: 400;
  }

  .cta-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid transparent;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(184, 147, 90, 0.35);
  }
  .btn-primary {
    background: var(--gold);
    color: var(--bg);
  }
  .btn-primary:hover {
    background: var(--gold-bright);
  }
  .btn-ghost {
    background: transparent;
    border-color: rgba(242, 237, 228, 0.25);
    color: var(--ink);
  }
  .btn-ghost:hover {
    border-color: var(--gold);
    color: var(--gold-bright);
  }
  .btn .arrow {
    transition: transform 0.3s ease;
  }
  .btn:hover .arrow { transform: translateX(4px); }

  /* ===== SECTION COMMON ===== */
  section.story {
    padding: 160px 56px;
    position: relative;
  }
  .section-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .section-label::before,
  .section-label::after {
    content: "";
    width: 36px;
    height: 1px;
    background: var(--gold);
    opacity: 0.5;
  }

  /* ===== WHO WE ARE ===== */
  .who h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(44px, 6vw, 88px);
    line-height: 1.0;
    text-align: center;
    margin-bottom: 64px;
    letter-spacing: -0.02em;
  }
  .who h2 em { font-style: italic; color: var(--gold-bright); font-weight: 300; }

  .who-body {
    max-width: 680px;
    margin: 0 auto;
    text-align: center;
    color: var(--ink);
    font-size: 19px;
    line-height: 1.75;
    font-weight: 300;
  }
  .who-body p { margin-bottom: 28px; color: rgba(242, 237, 228, 0.8); }

  .who-body ul {
    list-style: none;
    margin: 0 auto 28px;
    text-align: left;
    display: inline-block;
    color: rgba(242, 237, 228, 0.8);
  }
  .who-body ul li {
    position: relative;
    padding-left: 20px;
    margin-bottom: 12px;
    font-size: 18px;
    line-height: 1.6;
  }
  .who-body ul li::before {
    content: "·";
    position: absolute;
    left: 0;
    color: var(--gold);
    font-size: 1.4em;
    line-height: 1.1;
  }

  .who-pledge {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #b8935a;
    font-size: clamp(28px, 3.4vw, 44px);
    font-weight: 400;
    line-height: 1.2;
    text-align: center;
    margin-top: 56px;
    letter-spacing: 0.005em;
  }

  /* ===== FOOTER ===== */
  footer {
    border-top: 1px solid var(--line);
    padding: 56px 24px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
  }
  footer .logo { font-size: 1.8rem; }
  footer .footer-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }
  footer .footer-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.3s ease;
  }
  footer .footer-links a:hover { color: var(--gold); }
  footer .copy {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ===== SCROLL FADE ===== */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 1.2s ease, transform 1.2s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    nav { padding: 18px 20px; gap: 16px; }
    .nav-links { display: none; }
    .nav-right { gap: 16px; }
  }
  @media (max-width: 768px) {
    html, body { overflow-x: hidden; max-width: 100vw; }
    section.story { padding: 96px 24px; }
    .hero { padding: 110px 20px 80px; }
    h1.hero-title { font-size: clamp(34px, 8.5vw, 52px); margin-bottom: 28px; }
    .hero-kicker { font-size: 10px; letter-spacing: 0.24em; margin-bottom: 22px; }
    .hero-sub { font-size: 15px; margin: -4px auto 32px; padding: 0 6px; }
    .who h2 { font-size: clamp(34px, 8vw, 56px); }
    .who-body { font-size: 16px; }
    .who-body ul li { font-size: 15px; }
    .who-body p { margin-bottom: 22px; }
    .who-pledge { font-size: clamp(24px, 6.5vw, 32px); margin-top: 40px; }
    .cta-row { flex-direction: column; width: 100%; gap: 12px; }
    .cta-row .btn { width: 100%; justify-content: center; }
    .lang-toggle button { padding: 5px 11px; font-size: 10px; }
    footer { padding: 40px 24px; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Magna<span class="dot">·</span>Properties</div>
  <div class="nav-right">
    <ul class="nav-links">
      <li><a href="#manifesto" data-i18n="nav.about">Quem Somos</a></li>
    </ul>
    <div class="lang-toggle" role="tablist" aria-label="Language">
      <button id="lang-pt" type="button" class="active">PT</button>
      <button id="lang-en" type="button">EN</button>
    </div>
  </div>
</nav>

<!-- ============ HERO ============ -->
<header class="hero" data-screen-label="01 Hero">
  <canvas id="particle-canvas"></canvas>

  <div class="hero-content">
    <div class="hero-kicker" data-i18n="hero.kicker"></div>
    <h1 class="hero-title" data-i18n-html="hero.title">Bem-vindo <em>ao futuro</em> do imobiliário.</h1>
    <p class="hero-sub" data-i18n="hero.sub"></p>
    <div class="cta-row">
      <a href="/venda/?lang=pt" class="btn btn-primary" id="hero-cta1">
        <span data-i18n="hero.cta1">Apresentar o Meu Negócio a Investidores</span>
        <span class="arrow">→</span>
      </a>
      <a href="/investir/?lang=pt" class="btn btn-ghost" id="hero-cta2">
        <span data-i18n="hero.cta2">Quero Investir</span>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>
</header>

<!-- ============ WHO WE ARE ============ -->
<section id="manifesto" class="story who reveal" data-screen-label="02 Who We Are">
  <div class="section-label" data-i18n="who.label">Quem Somos</div>
  <h2 data-i18n-html="who.title">Diferentes<br><em>por natureza.</em></h2>
  <div class="who-body" id="who-body-content">
    <!-- injected by setLang -->
  </div>
</section>

<!-- ============ FOOTER ============ -->
<footer>
  <div class="logo">Magna<span class="dot">·</span>Properties</div>
  <ul class="footer-links">
    <li><a href="#manifesto" data-i18n="foot.about">Quem Somos</a></li>
  </ul>
  <div class="copy">© 2026 Magna Properties, Lda. · Algarve</div>
</footer>

<script>
/* ============ I18N ============ */
const whoBodyContent = {
  pt: `
    <p>A Magna Properties é uma empresa de consultoria imobiliária sediada no Algarve, especializada em identificar oportunidades de investimento com elevado potencial.</p>
    <p>Atuamos num mercado exigente e competitivo, onde cada decisão requer conhecimento profundo, visão estratégica e um acompanhamento próximo e personalizado.</p>
    <p>Acreditamos que cada investimento merece uma abordagem exclusiva e sempre assente na transparência.</p>
    <p>Os nossos serviços incluem:</p>
    <ul>
      <li>Análise e avaliação de oportunidades de investimento imobiliário.</li>
      <li>Elaboração de dossiês de negócio detalhados, dirigidos a investidores nacionais e internacionais, com ou sem experiência.</li>
      <li>Acompanhamento integral em processos de aquisição, construção, reabilitação e revenda.</li>
      <li>Promoção e comercialização de novos empreendimentos imobiliários.</li>
    </ul>
    <div class="who-pledge">Rule #1: Speed.</div>
  `,
  en: `
    <p>Magna Properties is a real estate advisory company based in the Algarve, specialized in identifying high-potential investment opportunities.</p>
    <p>We operate in a demanding and competitive market, where every decision requires deep knowledge, strategic vision, and close, personalized support.</p>
    <p>We believe every investment deserves an exclusive approach, always grounded in transparency.</p>
    <p>Our services include:</p>
    <ul>
      <li>Analysis and evaluation of real estate investment opportunities.</li>
      <li>Preparation of detailed business dossiers, aimed at national and international investors, with or without prior experience.</li>
      <li>Full support throughout acquisition, construction, rehabilitation, and resale processes.</li>
      <li>Promotion and commercialization of new real estate developments.</li>
    </ul>
    <div class="who-pledge">Rule #1: Speed.</div>
  `
};

const dict = {
  en: {
    "nav.about": "About",
    "hero.kicker": "",
    "hero.title": "Welcome to the <em>future</em> of real estate.",
    "hero.sub": "",
    "hero.cta1": "Present My Deal to Investors",
    "hero.cta2": "I Want to Invest",
    "who.label": "Who We Are",
    "who.title": "Different<br><em>by nature.</em>",
    "foot.about": "About"
  },
  pt: {
    "nav.about": "Quem Somos",
    "hero.kicker": "",
    "hero.title": "Bem-vindo ao <em>futuro</em> do imobiliário.",
    "hero.sub": "",
    "hero.cta1": "Apresentar o Meu Negócio a Investidores",
    "hero.cta2": "Quero Investir",
    "who.label": "Quem Somos",
    "who.title": "Diferentes<br><em>por natureza.</em>",
    "foot.about": "Quem Somos"
  }
};

let currentLang = 'pt';

function atualizarLinksLang(lang) {
  const links = {
    'hero-cta1': '/venda/?lang=' + lang,
    'hero-cta2': '/investir/?lang=' + lang,
  };
  Object.entries(links).forEach(([id, href]) => {
    const el = document.getElementById(id);
    if (el) el.href = href;
  });
}

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[lang][key] !== undefined) el.textContent = dict[lang][key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (dict[lang][key] !== undefined) el.innerHTML = dict[lang][key];
  });

  // Hide elements whose translation is empty
  document.querySelectorAll('[data-i18n], [data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n') || el.getAttribute('data-i18n-html');
    const val = dict[lang][key];
    el.style.display = (val === '' || val === undefined && el.textContent.trim() === '') ? 'none' : '';
  });

  // Inject who-body content
  const whoBody = document.getElementById('who-body-content');
  if (whoBody) whoBody.innerHTML = whoBodyContent[lang];

  document.getElementById('lang-pt').classList.toggle('active', lang === 'pt');
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  atualizarLinksLang(lang);
}

document.getElementById('lang-pt').addEventListener('click', () => setLang('pt'));
document.getElementById('lang-en').addEventListener('click', () => setLang('en'));

setLang('pt');

/* ============ SCROLL REVEAL ============ */
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      io.unobserve(e.target);
    }
  });
}, { threshold: 0.15 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));

/* ============ PARTICLE CANVAS ============ */
(function(){
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  const COUNT = 70;
  const LINK_DIST = 150;

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = canvas.getBoundingClientRect();
    W = Math.max(rect.width, window.innerWidth);
    H = Math.max(rect.height, window.innerHeight);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function init() {
    resize();
    particles = [];
    for (let i = 0; i < COUNT; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 1.4 + 0.6
      });
    }
  }

  function step() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(184, 147, 90, 0.55)';
      ctx.fill();
    }
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < LINK_DIST) {
          const alpha = (1 - dist / LINK_DIST) * 0.18;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(184, 147, 90, ${alpha})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(step);
  }

  window.addEventListener('resize', () => {
    resize();
    for (const p of particles) {
      if (p.x > W) p.x = Math.random() * W;
      if (p.y > H) p.y = Math.random() * H;
    }
  });
  init();
  step();
})();
</script>
</body>
</html>
